<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Phụ Tùng | MotoSys</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/danh-sach-xe.css"> <!-- Dùng chung style toolbar/table -->
  <link rel="stylesheet" href="css/phu-tung.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand" href="trang-chu.html">
        <i class="fa-solid fa-motorcycle me-2"></i>MOTO<span>SYS</span>
      </a>
      <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <i class="fa-solid fa-bars"></i>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item">
            <a class="nav-link" href="trang-chu.html">Trang Chủ</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="danh-sach-xe-may.html">Danh Sách Xe Máy</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="danh-sach-phu-tung.html">Danh Sách Phụ Tùng</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="hoa-don.html">Hóa Đơn</a>
          </li>
        </ul>
        <div class="d-flex align-items-center">
          <a href="hoa-don.html" class="btn btn-outline-light position-relative">
            <i class="fa-solid fa-cart-shopping"></i> Lập hóa đơn
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="cartCount">
              0
            </span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="container py-4">
    <!-- Header Page -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="mb-0">Quản Lý Phụ Tùng</h2>
      <button class="btn btn-primary" id="btnThemPT" data-bs-toggle="modal" data-bs-target="#modalPhuTung">
        <i class="fa-solid fa-plus me-2"></i>Thêm Phụ Tùng
      </button>
    </div>

    <!-- Toolbar Filters & Search -->
    <div class="filter-toolbar card mb-4">
      <div class="card-body">
        <div class="row g-3">
          <!-- Search -->
          <div class="col-md-4">
            <div class="input-group">
              <span class="input-group-text bg-white"><i class="fa-solid fa-search text-muted"></i></span>
              <input type="text" class="form-control" id="searchPT" placeholder="Tìm tên phụ tùng, mã...">
            </div>
          </div>
          <!-- Filter Loại -->
          <div class="col-md-3">
            <select class="form-select" id="filterLoaiPT">
              <option value="all">Tất cả loại phụ tùng</option>
              <option value="Lốp xe">Lốp xe</option>
              <option value="Dầu nhớt">Dầu nhớt</option>
              <option value="Bình ắc quy">Bình ắc quy</option>
              <option value="Đèn xe">Đèn xe</option>
              <option value="Gương chiếu hậu">Gương chiếu hậu</option>
              <option value="Phanh">Phanh</option>
              <option value="Nhông sên dĩa">Nhông sên dĩa</option>
            </select>
          </div>
          <!-- Filter Giá -->
          <div class="col-md-3">
            <select class="form-select" id="filterGiaPT">
              <option value="all">Tất cả mức giá</option>
              <option value="duoi100">Dưới 100k</option>
              <option value="100-300">Từ 100k - 300k</option>
              <option value="300-500">Từ 300k - 500k</option>
              <option value="tren500">Trên 500k</option>
            </select>
          </div>
          <!-- Sort -->
          <div class="col-md-2">
            <select class="form-select" id="sortGiaPT">
              <option value="default">Sắp xếp</option>
              <option value="asc">Giá: Tăng dần</option>
              <option value="desc">Giá: Giảm dần</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- Data Table -->
    <div class="card shadow-sm">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0" id="tablePhuTung">
            <thead class="table-light">
              <tr>
                <th width="80">Mã PT</th>
                <th width="80">Hình ảnh</th>
                <th>Tên Phụ Tùng</th>
                <th>Loại</th>
                <th>Nhà cung cấp</th>
                <th>Giá Bán</th>
                <th width="80" class="text-center">Tồn kho</th>
                <th width="120" class="text-center">Thao tác</th>
              </tr>
            </thead>
            <tbody id="tbodyPhuTung">
              <!-- Render by JS -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Pagination -->
    <div class="d-flex justify-content-between align-items-center mt-3">
      <div class="text-muted" id="infoPagination">
        Hiển thị 1 - 10 trong 20
      </div>
      <nav aria-label="Page navigation">
        <ul class="pagination pagination-sm mb-0" id="paginationContainer">
          <!-- Render by JS -->
        </ul>
      </nav>
    </div>
  </main>

  <!-- MODAL THÊM / SỬA PHỤ TÙNG -->
  <div class="modal fade" id="modalPhuTung" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalPTLabel">Thêm Phụ Tùng Mới</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="formPhuTung">
            <input type="hidden" id="formActionPT" value="add">
            
            <div class="row g-3 mb-3">
              <div class="col-md-4">
                <label class="form-label">Mã phụ tùng</label>
                <input type="text" class="form-control" id="inpMaPT" required>
              </div>
              <div class="col-md-8">
                <label class="form-label">Tên phụ tùng</label>
                <input type="text" class="form-control" id="inpTenPT" required>
              </div>
              
              <div class="col-md-6">
                <label class="form-label">Loại phụ tùng</label>
                <select class="form-select" id="inpLoaiPT" required>
                  <option value="">Chọn loại</option>
                  <option value="Lốp xe">Lốp xe</option>
                  <option value="Dầu nhớt">Dầu nhớt</option>
                  <option value="Bình ắc quy">Bình ắc quy</option>
                  <option value="Đèn xe">Đèn xe</option>
                  <option value="Gương chiếu hậu">Gương chiếu hậu</option>
                  <option value="Phanh">Phanh</option>
                  <option value="Nhông sên dĩa">Nhông sên dĩa</option>
                  <option value="Khác">Khác</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Nhà cung cấp</label>
                <input type="text" class="form-control" id="inpNhaCungCap" required>
              </div>

              <div class="col-md-4">
                <label class="form-label">Giá nhập (VNĐ)</label>
                <input type="number" class="form-control" id="inpGiaNhapPT" required min="0">
              </div>
              <div class="col-md-4">
                <label class="form-label">Giá bán (VNĐ)</label>
                <input type="number" class="form-control" id="inpGiaBanPT" required min="0">
              </div>
              <div class="col-md-4">
                <label class="form-label">Số lượng tồn</label>
                <input type="number" class="form-control" id="inpTonKhoPT" required min="0">
              </div>

              <div class="col-12">
                <label class="form-label">Đường dẫn hình ảnh (URL)</label>
                <input type="url" class="form-control" id="inpHinhAnhPT" placeholder="https://..." required>
                <div class="mt-2 text-center bg-light border p-2 rounded">
                  <img id="previewImgPT" src="https://via.placeholder.com/200x200?text=Preview" alt="Preview" style="height: 100px; object-fit: cover;">
                </div>
              </div>
              <div class="col-12">
                <label class="form-label">Mô tả sản phẩm</label>
                <textarea class="form-control" id="inpMoTaPT" rows="3"></textarea>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
          <button type="button" class="btn btn-primary" id="btnSavePT">Lưu Thông Tin</button>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST NOTIFICATION -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header text-white bg-success" id="toastHeader">
        <i class="fa-solid fa-circle-check me-2"></i>
        <strong class="me-auto" id="toastTitle">Thông báo</strong>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div class="toast-body bg-white" id="toastMessage">Thành công.</div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="mt-5">
    <div class="container text-center">
      <p class="mb-0 text-muted">&copy; 2024 MotoSys. Tất cả quyền được bảo lưu.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/phu-tung.js"></script>
</body>
</html>
